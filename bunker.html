<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>MATE SKARY — Abandoned Bunker</title>
<style>
:root{--acid:#ffff00;--amber:#ff9900;--dark:#050509;}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050509;color:#eee;font-family:"Courier New",monospace;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;image-rendering:pixelated;}
#enterScreen{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;text-align:center;padding:22px;background:radial-gradient(circle at 50% 45%,rgba(255,255,0,.12),transparent 30%),linear-gradient(180deg,#07070b,#111016 60%,#030306);} 
#enterBox{max-width:780px;border:3px solid #777;outline:2px solid #09090d;background:rgba(7,7,11,.9);box-shadow:0 0 34px rgba(255,255,0,.18),inset 0 0 45px rgba(90,255,0,.08);padding:24px;}
#enterBox h1{margin:0 0 12px;font-size:clamp(24px,6vw,54px);letter-spacing:3px;color:#d7d7d7;text-shadow:4px 4px #000,0 0 18px var(--acid);} 
#enterBox p{font-size:clamp(14px,2.8vw,20px);line-height:1.45;margin:10px 0;}
#enterButton{position:relative;z-index:40;pointer-events:auto;margin-top:18px;font-family:inherit;font-weight:bold;letter-spacing:2px;padding:14px 22px;border:2px solid var(--acid);background:#151515;color:var(--acid);cursor:pointer;box-shadow:0 0 14px rgba(255,255,0,.35);} 
#hud{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;width:min(860px,calc(100vw - 26px));box-sizing:border-box;text-align:center;padding:10px 12px;border:3px solid rgba(180,180,90,.55);background:rgba(0,0,0,.68);color:#f2f2e8;font-size:clamp(11px,2.2vw,18px);line-height:1.25;text-shadow:2px 2px #000;box-shadow:0 0 22px rgba(255,255,0,.12);display:none;}
#reticle{position:fixed;left:50%;top:50%;width:22px;height:22px;margin-left:-11px;margin-top:-11px;z-index:11;pointer-events:none;display:none;}
#reticle:before,#reticle:after{content:"";position:absolute;background:rgba(255,255,0,.78);box-shadow:0 0 8px rgba(255,255,0,.9);}#reticle:before{width:22px;height:2px;top:10px;left:0;}#reticle:after{width:2px;height:22px;left:10px;top:0;}
#ladderPrompt{position:fixed;left:50%;top:36%;transform:translate(-50%,-50%);z-index:13;display:none;pointer-events:auto;cursor:pointer;padding:14px 22px;border:3px solid rgba(255,40,0,.95);background:rgba(0,0,0,.82);color:#ff2200;font-weight:bold;font-size:clamp(18px,4vw,36px);letter-spacing:3px;text-align:center;text-shadow:2px 2px #000,0 0 18px #ff0000;box-shadow:0 0 30px rgba(255,0,0,.75);}#interact{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:12;display:none;padding:10px 16px;border:3px solid rgba(255,255,0,.65);background:rgba(0,0,0,.78);color:var(--acid);font-weight:bold;font-size:clamp(12px,2.8vw,18px);text-align:center;text-shadow:2px 2px #000;box-shadow:0 0 18px rgba(255,255,0,.28);}
#objectModal{position:fixed;inset:0;z-index:25;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.74);padding:16px;}
#modalBox{width:min(620px,92vw);border:3px solid #9c9c9c;background:#0d0d13;color:#f2f2f2;box-shadow:0 0 35px rgba(255,255,0,.2),inset 0 0 28px rgba(123,44,255,.2);padding:18px;text-align:center;}#modalBox h2{margin:0 0 10px;color:var(--acid);text-shadow:3px 3px #000;font-size:clamp(20px,5vw,36px);}#modalBox p{line-height:1.5;font-size:clamp(13px,3vw,17px)}.modalButtons{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:16px}.modalButtons button,.modalButtons a{font-family:inherit;font-weight:bold;text-decoration:none;color:#111;background:var(--acid);border:0;padding:10px 13px;cursor:pointer}.modalButtons button{color:#eee;background:#292933;border:1px solid #777}
@media(max-width:700px){#hud{top:7px;padding:7px 8px}#interact{bottom:14px;width:calc(100vw - 34px)}#enterBox{padding:18px}}
</style>
</head>
<body>
<div id="enterScreen"><div id="enterBox"><h1>ABANDONED  BUNKER</h1><p>MOVE : WASD<br>LOOK : MOUSE / DRAG<br>CLICK OBJECTS : ENTER PORTALS</p><button id="enterButton">ENTER THE BUNKER</button></div></div>
<div id="hud">MOVE : WASD &nbsp; / &nbsp; LOOK : MOUSE &nbsp; / &nbsp; CLICK OBJECTS : ENTER PORTALS</div>
<div id="reticle"></div><div id="ladderPrompt">↑ BACK TO FOREST</div><div id="interact">CLICK TO TOUCH THE BUNKER SIGIL</div>
<div id="objectModal"><div id="modalBox"><h2 id="modalTitle">BUNKER SIGIL</h2><p id="modalText">The chamber listens.</p><div class="modalButtons"><a id="modalPortal" href="#" target="_self">ENTER PORTAL</a><button id="modalClose">CLOSE</button></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
(()=>{
const FOREST_URL="index.html", CHANGING_ROOM_URL="changing-room.html", SHOP_URL="https://ratcaps.myshopify.com/";
let scene,camera,renderer,clock,yaw=0,pitch=0,started=false,touchLook=null,nearest=null,activePortalURL=null;const keys={},interactables=[],animated=[];
const $=id=>document.getElementById(id);const enterScreen=$("enterScreen"),enterButton=$("enterButton"),hud=$("hud"),reticle=$("reticle"),interactPrompt=$("interact"),ladderPrompt=$("ladderPrompt"),modal=$("objectModal"),modalTitle=$("modalTitle"),modalText=$("modalText"),modalPortal=$("modalPortal"),modalClose=$("modalClose");

if(enterButton){
 enterButton.onclick=startBunkerGame;
 enterButton.addEventListener("click",startBunkerGame,true);
 enterButton.addEventListener("pointerdown",(e)=>e.stopPropagation(),true);
}

function pixelTexture(draw,w=128,h=128){const c=document.createElement('canvas');c.width=w;c.height=h;const ctx=c.getContext('2d');ctx.imageSmoothingEnabled=false;draw(ctx,w,h);const t=new THREE.CanvasTexture(c);t.magFilter=THREE.NearestFilter;t.minFilter=THREE.NearestFilter;t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;}
function mat(color,opts={}){return new THREE.MeshStandardMaterial({color,roughness:opts.roughness??.86,metalness:opts.metalness??0,emissive:opts.emissive??0x000000,emissiveIntensity:opts.emissiveIntensity??0,map:opts.map??null,transparent:opts.transparent??false,opacity:opts.opacity??1,side:opts.side??THREE.FrontSide});}
const stoneTex=pixelTexture((ctx,w,h)=>{ctx.fillStyle="#34363a";ctx.fillRect(0,0,w,h);for(let y=0;y<h;y+=8){for(let x=0;x<w;x+=8){let r=Math.random();ctx.fillStyle=r>.72?"#494b50":r>.45?"#2a2c30":r>.22?"#3d3f43":"#191b1e";ctx.fillRect(x,y,8,8);if(Math.random()>.72){ctx.fillStyle="rgba(86,105,24,.5)";ctx.fillRect(x,y,8,8)}}}ctx.strokeStyle="rgba(0,0,0,.58)";ctx.lineWidth=2;for(let y=0;y<h;y+=16){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}for(let x=0;x<w;x+=16){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}},128,128);
const floorTex=pixelTexture((ctx,w,h)=>{ctx.fillStyle="#27282b";ctx.fillRect(0,0,w,h);for(let y=0;y<h;y+=8){for(let x=0;x<w;x+=8){ctx.fillStyle=["#303136","#1a1b1e","#3b3c40","#222318","#435114"][Math.floor(Math.random()*5)];ctx.fillRect(x,y,8,8)}}ctx.strokeStyle="rgba(0,0,0,.65)";ctx.lineWidth=2;for(let y=0;y<h;y+=24){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}for(let x=0;x<w;x+=24){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}},128,128);
function box(w,h,d,x,y,z,m,parent=scene){const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);mesh.position.set(x,y,z);parent.add(mesh);return mesh;}
function cyl(r,h,x,y,z,m,seg=6,parent=scene){const mesh=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,seg),m);mesh.position.set(x,y,z);parent.add(mesh);return mesh;}

function startBunkerGame(e){
 if(e){e.preventDefault();e.stopPropagation();}
 started=true;
 if(enterScreen){enterScreen.style.display="none";enterScreen.style.pointerEvents="none";}
 if(hud)hud.style.display="block";
 if(reticle)reticle.style.display="block";
 if(modal)modal.style.display="none";
 setTimeout(()=>{try{if(renderer&&renderer.domElement&&renderer.domElement.requestPointerLock){renderer.domElement.requestPointerLock();}}catch(err){}},30);
}

function init(){scene=new THREE.Scene();scene.background=new THREE.Color(0x050509);scene.fog=new THREE.FogExp2(0x060608,.035);camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,1000);camera.position.set(0,2.2,9.6);renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:"high-performance"});renderer.setPixelRatio(Math.min(devicePixelRatio,1.35));renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);clock=new THREE.Clock();scene.add(new THREE.AmbientLight(0x222222,1.35));const moon=new THREE.DirectionalLight(0x8490aa,.25);moon.position.set(-5,8,8);scene.add(moon);buildChamber();buildVoxelVines();buildPipes();buildSigil();buildShopPortal();buildCeilingLadder();buildCeilingForestPortal();buildForestReturnSprite();buildParticles();bind();animate();}
function buildChamber(){const sm=mat(0xffffff,{map:stoneTex,roughness:.95}),fm=mat(0xffffff,{map:floorTex,roughness:.96});sm.map.repeat.set(4,2.2);fm.map.repeat.set(7,7);box(30,1,30,0,-.55,0,fm);box(30,10,1,0,4.5,-14,sm);box(30,10,1,0,4.5,14,sm);box(1,10,30,-14,4.5,0,sm);box(1,10,30,14,4.5,0,sm);box(30,1,30,0,9.8,0,sm);
const col=mat(0x3d3e42,{roughness:.92});for(const x of[-10,10])for(const z of[-8,7]){box(1.45,8,1.45,x,3.5,z,col);box(2.1,.45,2.1,x,.2,z,col);box(2.1,.45,2.1,x,7.7,z,col)}
makePortal("CHANGING ROOM PORTAL","A cracked doorway opens toward the changing room.",CHANGING_ROOM_URL,-8.7,2.2,-13.35,0xffff00,"CHANGING\nROOM\nPORTAL");
makePortal("SHOP PORTAL","The orange gate leads toward the checkout ritual.",SHOP_URL,8.7,2.2,-13.35,0xff9900,"SHOP\nPORTAL");
for(const p of [[-12.8,4,-8],[12.8,4,-8],[-12.8,4,6],[12.8,4,6],[0,7.6,-13.1]])makeLamp(...p);
// floor grates and cracks
const dark=mat(0x070708,{roughness:.8,metalness:.2});for(let z=-10;z<12;z+=4){for(let i=-2;i<=2;i++)box(.09,.05,3.2,i*.45,.03,z,dark);box(2.6,.05,.09,0,.04,z-1.6,dark);box(2.6,.05,.09,0,.04,z+1.6,dark)}
const moss=mat(0x354d06,{roughness:.9});for(let i=0;i<65;i++){box(.25+Math.random()*.9,.035,.25+Math.random()*.9,-13+Math.random()*26,.04,-12+Math.random()*24,moss)} }
function makePortal(title,text,url,x,y,z,color,label){const glow=mat(color,{emissive:color,emissiveIntensity:.35,transparent:true,opacity:.38});const dark=mat(0x060706,{roughness:.9});box(5.4,6.2,.28,x,y+1,z,dark);const obj=box(4.1,4.2,.18,x,y+1,z+.18,glow);obj.userData={title,text,url,baseOpacity:.38,pulse:Math.random()*10};interactables.push(obj);const light=new THREE.PointLight(color,1.2,9);light.position.set(x,y+1,z+1.2);scene.add(light);makePixelText(label,x,y+1.8,z+.35,color,.38);}
function makePixelText(txt,x,y,z,color,scale=.35){const c=document.createElement('canvas');c.width=256;c.height=128;const ctx=c.getContext('2d');ctx.imageSmoothingEnabled=false;ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);ctx.font='bold 28px Courier New';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#'+color.toString(16).padStart(6,'0');txt.split('\n').forEach((line,i)=>ctx.fillText(line,128,45+i*36));const tex=new THREE.CanvasTexture(c);tex.magFilter=THREE.NearestFilter;const m=new THREE.MeshBasicMaterial({map:tex,transparent:true,opacity:.95,side:THREE.DoubleSide});const plane=new THREE.Mesh(new THREE.PlaneGeometry(4*scale,2*scale),m);plane.position.set(x,y,z);scene.add(plane);}
function makeLamp(x,y,z){const metal=mat(0x2b2415,{metalness:.45,roughness:.5});box(.9,.12,.12,x,y,z,metal);box(.12,.9,.12,x,y,z,metal);const core=box(.45,.55,.18,x,y,z+.05,new THREE.MeshBasicMaterial({color:0xffee99}));const l=new THREE.PointLight(0xffc742,1.25,8);l.position.set(x,y,z+.6);l.userData.lamp=true;scene.add(l);animated.push(core,l);}
function buildVoxelVines(){
const greens=[0x123902,0x174503,0x245f05,0x2f7507,0x3b8b04,0x6fae0b,0x9ecb12];
const leafMats=greens.map(c=>mat(c,{roughness:.94}));
const vineMats=greens.map(c=>mat(c,{roughness:.96}));
function m(){return leafMats[Math.floor(Math.random()*leafMats.length)]}
function vm(){return vineMats[Math.floor(Math.random()*vineMats.length)]}
function cube(x,y,z,s,material=m(),parent=scene){box(s,s*.9,.09,x,y,z,material,parent)}
function leaf(x,y,z,scale=1,rot=0,parent=scene){
 const g=new THREE.Group();
 const mm=m();
 const a=box(.18*scale,.28*scale,.06*scale,0,0,0,mm,g);
 const b=box(.14*scale,.22*scale,.06*scale,.12*scale,.03*scale,0,mm,g);
 const c=box(.14*scale,.22*scale,.06*scale,-.12*scale,.03*scale,0,mm,g);
 g.position.set(x,y,z);g.rotation.z=rot;parent.add(g);return g;
}
function wallStrands(z,rangeX,count,longness){
 for(let strand=0;strand<count;strand++){
  let x=rangeX[0]+Math.random()*(rangeX[1]-rangeX[0]);let y=9.05-Math.random()*.7;let len=longness[0]+Math.random()*longness[1];
  for(let i=0;i<len;i++){
   y-=.24+Math.random()*.12;x+=Math.sin(i*.85+strand)*.075;
   cube(x,y,z,.2+Math.random()*.08,vm());
   if(Math.random()>.22)leaf(x+(Math.random()-.5)*.55,y+(Math.random()-.5)*.18,z+.025,.75+Math.random()*.55,(Math.random()-.5)*1.6);
   if(Math.random()>.72)cube(x+(Math.random()-.5)*.75,y+(Math.random()-.5)*.22,z,.18+Math.random()*.1,m());
   if(Math.random()>.9)cube(x+(Math.random()-.5)*.45,y,z,.13,mat(0xded600,{roughness:.9}));
  }
 }
}
wallStrands(-13.46,[-13,13],38,[11,22]);
wallStrands(13.46,[-12,12],30,[8,18]);
// side wall crawling mats and roots
for(const side of[-13.46,13.46])for(let p=0;p<24;p++){
 const z=-12+Math.random()*24;const x=side;const baseY=1.2+Math.random()*6.8;
 for(let i=0;i<42;i++){
  const yy=baseY+(Math.random()-.5)*4.5,zz=z+(Math.random()-.5)*4.2;
  box(.09,.20+Math.random()*.18,.20+Math.random()*.22,x,yy,zz,m());
  if(Math.random()>.66)box(.08,.08,.38,x,yy,zz,m());
 }
}
// ceiling hanging plants: long vertical strands dropping from concrete
for(let strand=0;strand<55;strand++){
 const g=new THREE.Group();const x=-12+Math.random()*24,z=-12+Math.random()*24;const len=1.6+Math.random()*5.4;
 for(let i=0;i<len*5;i++){
  const yy=-(i*.18);const sway=Math.sin(i*.9+strand)*.08;
  box(.08,.18,.08,sway,yy,0,vm(),g);
  if(Math.random()>.38)leaf(sway+(Math.random()-.5)*.22,yy,0,.55+Math.random()*.55,(Math.random()-.5)*2,g);
 }
 g.position.set(x,9.25,z);g.rotation.y=Math.random()*Math.PI;scene.add(g);animated.push(g);
}
// ceiling spread/canopy blocks and plant patches
for(let i=0;i<120;i++){
 const x=-13+Math.random()*26,z=-13+Math.random()*26;
 box(.25+Math.random()*.9,.08,.25+Math.random()*.9,x,9.18,z,m());
}
// floor moss carpets, low vines and leafy clumps crawling around grates
for(let i=0;i<155;i++){
 const x=-13+Math.random()*26,z=-12.5+Math.random()*25;
 box(.18+Math.random()*1.25,.045,.18+Math.random()*1.1,x,.085,z,m());
 if(Math.random()>.58)leaf(x,.20,z,.75+Math.random()*.8,Math.random()*6.2);
}
for(let runner=0;runner<34;runner++){
 let x=-12+Math.random()*24,z=-12+Math.random()*24;
 const dir=Math.random()*Math.PI*2;
 for(let i=0;i<12+Math.random()*16;i++){
  x+=Math.cos(dir+(Math.random()-.5)*.8)*.32;z+=Math.sin(dir+(Math.random()-.5)*.8)*.32;
  box(.34,.055,.08,x,.12,z,vm());
  if(Math.random()>.55)leaf(x,.22,z,.55+Math.random()*.45,dir+Math.PI/2);
 }
}
}function buildPipes(){const pipe=mat(0x5b3515,{metalness:.35,roughness:.75}),rust=mat(0x8a461d,{metalness:.2,roughness:.9});for(const y of[7.2,8.0]){const p=cyl(.12,22,-.1,y,-13.0,pipe,6);p.rotation.z=Math.PI/2;box(.35,.35,.35,-11,y,-13,pipe);box(.35,.35,.35,11,y,-13,rust)}for(const x of[-6,6]){const p=cyl(.16,4,x,5.3,-13.0,pipe,6);p.rotation.x=0;box(.6,.6,.35,x,7.35,-13,pipe);box(.6,.6,.35,x,3.25,-13,rust)}}


function buildForestReturnSprite(){
const canvas=document.createElement("canvas");
canvas.width=512;
canvas.height=512;
const ctx=canvas.getContext("2d");
ctx.imageSmoothingEnabled=false;

ctx.clearRect(0,0,512,512);

for(let i=0;i<80;i++){
 ctx.fillStyle=["#ffee00","#ffff66","#ffcc00","#fff799"][Math.floor(Math.random()*4)];
 const s=[3,4,5,6][Math.floor(Math.random()*4)];
 ctx.fillRect(Math.random()*512,Math.random()*512,s,s);
}

// arrow
ctx.fillStyle="#ffff00";
ctx.fillRect(226,80,60,140);
ctx.fillRect(176,160,160,60);
ctx.beginPath();
ctx.moveTo(256,18);
ctx.lineTo(356,130);
ctx.lineTo(156,130);
ctx.closePath();
ctx.fill();

// text
ctx.font='bold 42px Courier New';
ctx.textAlign='center';
ctx.fillStyle='#ffff00';
ctx.fillText('CLICK TO',256,310);
ctx.fillText('RETURN TO',256,370);
ctx.fillText('FOREST',256,430);

const tex=new THREE.CanvasTexture(canvas);
tex.magFilter=THREE.NearestFilter;
tex.minFilter=THREE.NearestFilter;

const spriteMat=new THREE.SpriteMaterial({
 map:tex,
 transparent:true,
 opacity:.96
});

const sprite=new THREE.Sprite(spriteMat);
sprite.scale.set(4.9,4.9,1);
sprite.position.set(-6.8,2.8,3.0);

sprite.userData={
 hoverBaseY:2.8,
 floatOffset:Math.random()*10,
 title:"BACK TO FOREST",
 text:"Climb back into the haunted forest.",
 url:FOREST_URL,
 baseOpacity:.96
};

scene.add(sprite);
animated.push(sprite);
interactables.push(sprite);
}

function buildCeilingForestPortal(){
const g=new THREE.Group();

// black square frame cut into the concrete roof
const frameMat=mat(0x150000,{emissive:0x330000,emissiveIntensity:.35,roughness:.75});
const frame=new THREE.Mesh(new THREE.BoxGeometry(4.0,.16,4.0),frameMat);
g.add(frame);

// glowing red sky visible through the square manhole
const skyCanvas=document.createElement("canvas");
skyCanvas.width=64;skyCanvas.height=64;
const ctx=skyCanvas.getContext("2d");
ctx.imageSmoothingEnabled=false;
const grad=ctx.createLinearGradient(0,0,64,64);
grad.addColorStop(0,"#ff3300");
grad.addColorStop(.45,"#aa0000");
grad.addColorStop(1,"#ff7700");
ctx.fillStyle=grad;
ctx.fillRect(0,0,64,64);
for(let i=0;i<95;i++){
 ctx.fillStyle=["#ff0000","#ff3b00","#ff8800","#7a0000"][Math.floor(Math.random()*4)];
 const s=[2,3,4,5][Math.floor(Math.random()*4)];
 ctx.fillRect(Math.floor(Math.random()*64),Math.floor(Math.random()*64),s,s);
}
const skyTex=new THREE.CanvasTexture(skyCanvas);
skyTex.magFilter=THREE.NearestFilter;
skyTex.minFilter=THREE.NearestFilter;
const skyMat=new THREE.MeshBasicMaterial({map:skyTex,transparent:true,opacity:.98,side:THREE.DoubleSide});
const sky=new THREE.Mesh(new THREE.PlaneGeometry(3.15,3.15),skyMat);
sky.rotation.x=-Math.PI/2;
sky.position.y=-.095;
g.add(sky);

// subtle inner rim so it reads as a square manhole/skylight, not a sign
const rimMat=mat(0x050000,{emissive:0x660000,emissiveIntensity:.25,roughness:.7});
box(3.65,.18,.16,0,-.04,-1.9,rimMat,g);
box(3.65,.18,.16,0,-.04,1.9,rimMat,g);
box(.16,.18,3.65,-1.9,-.04,0,rimMat,g);
box(.16,.18,3.65,1.9,-.04,0,rimMat,g);

const redLight=new THREE.PointLight(0xff2200,3.2,18);
redLight.position.set(0,-1.25,0);
g.add(redLight);

// directly above the ladder position
g.position.set(-6.8,9.72,3.0);
scene.add(g);

// invisible-ish clickable portal plane directly under the hatch
const portalMat=new THREE.MeshBasicMaterial({color:0xff0000,transparent:true,opacity:.01,side:THREE.DoubleSide});
const portal=new THREE.Mesh(new THREE.PlaneGeometry(3.6,3.6),portalMat);
portal.rotation.x=-Math.PI/2;
portal.position.set(-6.8,9.25,3.0);
portal.userData={
 title:"BACK TO FOREST",
 text:"The red sky glows through the ceiling manhole.",
 url:FOREST_URL,
 baseOpacity:.01,
 pulse:0,
 ceilingForestPortal:true
};
scene.add(portal);
interactables.push(portal);

animated.push(sky,redLight);
